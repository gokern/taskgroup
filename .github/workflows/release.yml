name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Verify tag points to a passing build
        run: |
          go mod verify
          go vet ./...
          go test -race ./...

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease_flag=""
          case "$tag" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag \
            $prerelease_flag
