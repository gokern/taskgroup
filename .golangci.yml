version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gci
    - golines
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
        - pattern: "a[b:len(a)]"
          replacement: "a[b:]"

linters:
  default: all
  disable:
    - wsl # Deprecated, replaced by wsl_v5.
  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/gokern/taskgroup
            - github.com/stretchr/testify
    varnamelen:
      ignore-names:
        - i
        - wg
        - tg
        - fn
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - err113
          - funlen
      - path: taskgroup_test\.go
        text: "SA1012:"
        linters:
          - staticcheck
